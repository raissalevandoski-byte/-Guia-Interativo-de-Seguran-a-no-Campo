<section class="conteudo-painel">
            <h2>Checklist Diário: Inspeção do Trator</h2>
            <p>Marque todos os itens antes de dar a partida no motor:</p>

            <div class="progresso-container" style="background: #e2e8f0; border-radius: 10px; height: 12px; margin-bottom: 10px; overflow: hidden;">
                <div id="progresso-barra" style="background: #2c6e49; width: 0%; height: 100%; transition: width 0.3s ease;"></div>
            </div>
            <span id="progresso-texto" style="font-size: 0.85rem; color: #64748b; font-weight: 600; display: block; margin-bottom: 20px;">0% concluído</span>

            <div class="checklist-grupo">
                <label class="item-check">
                    <input type="checkbox" id="oleo">
                    <span class="checkmark"></span>
                    Nível do óleo do motor e água do radiador checados.
                </label>
                
                <label class="item-check">
                    <input type="checkbox" id="freios">
                    <span class="checkmark"></span>
                    Freios de serviço e de estacionamento testados.
                </label>

                <label class="item-check">
                    <input type="checkbox" id="protetor">
                    <span class="checkmark"></span>
                    Protetores das peças móveis e tomada de força (TDP) no lugar.
                </label>

                <label class="item-check">
                    <input type="checkbox" id="pneus">
                    <span class="checkmark"></span>
                    Calibragem e estado dos pneus verificados.
                </label>
            </div>

            <button id="btn-verificar" onclick="verificarSeguranca()">Verificar Status da Máquina</button>

            <div id="resultado" class="status-painel">
                Aguardando verificação...
            </div>
        </section>
